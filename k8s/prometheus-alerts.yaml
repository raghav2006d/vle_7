apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: k8s-custom-alerts
  namespace: monitoring
  labels:
    release: monitoring # this label binds the rule to kube-prometheus-stack
spec:
  groups:
  - name: k8s-alerts
    rules:
    - alert: PodCrashLoop
      expr: kube_pod_container_status_restarts_total > 3
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
        description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted more than 3 times in the last 2 minutes."
    
    - alert: HighCPUUsage
      expr: sum(rate(container_cpu_usage_seconds_total{container!="POD",container!=""}[5m])) by (pod) > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High CPU Usage in Pod {{ $labels.pod }}"
        description: "Pod {{ $labels.pod }} is using more than 80% CPU over 5 minutes."

    - alert: NodeDown
      expr: up{job="kubernetes-nodes"} == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Node {{ $labels.instance }} is down"
        description: "Node {{ $labels.instance }} has been unreachable for more than 5 minutes."
